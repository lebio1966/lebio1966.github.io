<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeadWaiter Challenge – CGU / Terms</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96B;
  --dark: #0A1628;
  --dark2: #0D1F3C;
  --dark3: #112444;
  --text: #F0E6D0;
  --text-dim: #A89070;
  --green: #4CAF50;
  --red: #E53935;
  --bg1: #0B1E38;
  --bg2: #071428;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Georgia', serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
}

/* ============================================================
   PAGE SÉLECTION LANGUE
============================================================ */
#page-lang {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 20px;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(26,74,122,0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(10,28,60,0.7) 0%, transparent 55%),
    linear-gradient(160deg, #0B1E38 0%, #071428 50%, #0A1628 100%);
  position: relative;
  overflow: hidden;
}

#page-lang::before {
  content:'';
  position:absolute; inset:0;
  background:
    radial-gradient(circle at 15% 85%, rgba(201,168,76,0.07) 0%, transparent 50%),
    radial-gradient(circle at 85% 15%, rgba(201,168,76,0.05) 0%, transparent 50%);
  pointer-events:none;
}

.hat-anim {
  font-size: 72px;
  display: block;
  text-align: center;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 28px rgba(201,168,76,0.6));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.main-title {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: bold;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 32px rgba(201,168,76,0.45), 0 2px 6px rgba(0,0,0,0.9);
  text-align: center;
  line-height: 1.1;
}

.main-sub {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-top: 8px;
  text-align: center;
}

.gold-divider {
  width: 240px;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 28px auto;
}

.lang-prompt {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 22px;
  text-align: center;
}

.lang-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  max-width: 500px;
}

.lang-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 14px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.25s;
  min-width: 90px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
}

.lang-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(201,168,76,0.06);
  opacity: 0;
  transition: opacity 0.2s;
}

.lang-btn:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 8px 28px rgba(201,168,76,0.2); }
.lang-btn:hover::before { opacity: 1; }
.lang-btn:active { transform: translateY(-1px); }

.flag { font-size: 40px; line-height: 1; }

.lang-name {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: bold;
}

/* ============================================================
   PAGE ACCUEIL (par langue)
============================================================ */
#page-accueil {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 20px;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(26,74,122,0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(10,28,60,0.7) 0%, transparent 55%),
    linear-gradient(160deg, #0B1E38 0%, #071428 50%, #0A1628 100%);
  position: relative;
  overflow: hidden;
}

#page-accueil::before {
  content:'';
  position:absolute; inset:0;
  background:
    radial-gradient(circle at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%);
  pointer-events:none;
}

.lang-badge {
  position: absolute;
  top: 18px;
  right: 18px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 20px;
  cursor: pointer;
  transition: background 0.2s;
  z-index: 10;
}

.lang-badge:hover { background: rgba(201,168,76,0.25); }

.logo-icon {
  font-size: 68px;
  display: block;
  text-align: center;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 24px rgba(201,168,76,0.55));
  animation: float 3s ease-in-out infinite;
}

.game-title {
  font-size: clamp(30px, 6vw, 54px);
  font-weight: bold;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 32px rgba(201,168,76,0.45), 0 2px 6px rgba(0,0,0,0.9);
  line-height: 1.1;
  text-align: center;
}

.game-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 8px;
  text-align: center;
}

.cgv-block {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.28);
  border-radius: 14px;
  padding: 20px 24px 14px;
  max-width: 500px;
  width: 100%;
  margin-bottom: 20px;
  backdrop-filter: blur(6px);
}

.cgv-checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
  user-select: none;
}

.cgv-checkbox-row input[type="checkbox"] { display: none; }

.custom-checkbox {
  width: 24px;
  height: 24px;
  min-width: 24px;
  border: 2px solid var(--gold);
  border-radius: 6px;
  background: rgba(201,168,76,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.25s;
}

.custom-checkbox.checked {
  background: var(--gold);
  box-shadow: 0 0 14px rgba(201,168,76,0.55);
}

.custom-checkbox.checked::after {
  content: '✓';
  color: var(--dark);
  font-size: 15px;
  font-weight: bold;
}

.cgv-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.65;
}

.cgv-link {
  color: var(--gold);
  text-decoration: underline;
  cursor: pointer;
  font-weight: bold;
  background: none;
  border: none;
  font-size: 13px;
  font-family: inherit;
  padding: 0;
  transition: color 0.2s;
}

.cgv-link:hover { color: var(--gold-light); text-shadow: 0 0 8px rgba(201,168,76,0.5); }

.evin-mention {
  font-size: 10px;
  color: rgba(201,168,76,0.45);
  text-align: center;
  margin-top: 10px;
  letter-spacing: 0.4px;
}

.btn-jouer {
  background: linear-gradient(135deg, var(--gold) 0%, #A8782A 100%);
  color: var(--dark);
  border: none;
  border-radius: 50px;
  padding: 17px 60px;
  font-size: 18px;
  font-weight: bold;
  font-family: 'Georgia', serif;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 22px rgba(201,168,76,0.3);
  opacity: 0.35;
  pointer-events: none;
}

.btn-jouer.active {
  opacity: 1;
  pointer-events: all;
  box-shadow: 0 6px 32px rgba(201,168,76,0.55);
}

.btn-jouer.active:hover { transform: translateY(-3px); box-shadow: 0 10px 42px rgba(201,168,76,0.7); }
.btn-jouer.active:active { transform: translateY(0); }

/* ============================================================
   PAGE CGU
============================================================ */
#page-cgu {
  display: none;
  min-height: 100vh;
  background: linear-gradient(180deg, #0B1E38 0%, #071428 100%);
}

.cgu-header {
  background: linear-gradient(135deg, #0D1F3C 0%, #112444 100%);
  border-bottom: 2px solid var(--gold);
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 14px;
}

.btn-back {
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
  white-space: nowrap;
}

.btn-back:hover { background: rgba(201,168,76,0.28); }

.cgu-header-title {
  color: var(--gold);
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 0.8px;
}

.cgu-content {
  max-width: 780px;
  margin: 0 auto;
  padding: 36px 24px 80px;
}

.cgu-page-title {
  text-align: center;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(201,168,76,0.25);
}

.cgu-page-title .hat { font-size: 48px; display: block; margin-bottom: 10px; }
.cgu-page-title h1 { font-size: 24px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.cgu-page-title .meta { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
.cgu-page-title .editeur {
  display: inline-block;
  margin-top: 12px;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 12px;
  color: var(--gold);
}

.cgu-article { margin-bottom: 34px; }

.cgu-article h2 {
  font-size: 15px;
  color: var(--gold);
  border-bottom: 1px solid rgba(201,168,76,0.28);
  padding-bottom: 8px;
  margin-bottom: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.cgu-article p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.85;
  margin-bottom: 10px;
}

.cgu-article ul { list-style: none; padding: 0; margin: 8px 0; }

.cgu-article ul li {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  padding: 5px 0 5px 22px;
  position: relative;
}

.cgu-article ul li::before { content: '▸'; color: var(--gold); position: absolute; left: 0; }

.info-box {
  background: rgba(201,168,76,0.07);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 13px 18px;
  margin: 14px 0;
}

.info-box .box-label {
  font-size: 10px;
  color: var(--gold);
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.info-box p { font-size: 12px; margin: 0; line-height: 1.65; }

.warning-box {
  background: rgba(229,57,53,0.08);
  border-left: 3px solid var(--red);
  border-radius: 0 8px 8px 0;
  padding: 13px 18px;
  margin: 14px 0;
}

.warning-box .box-label {
  font-size: 10px;
  color: var(--red);
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.warning-box p { font-size: 12px; color: #E8A0A0; margin: 0; line-height: 1.65; }

.public-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
@media (max-width: 520px) { .public-grid { grid-template-columns: 1fr; } }

.public-ok, .public-non { border-radius: 10px; padding: 14px; }
.public-ok { background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.3); }
.public-non { background: rgba(229,57,53,0.08); border: 1px solid rgba(229,57,53,0.3); }
.public-ok h4 { color: var(--green); font-size: 12px; margin-bottom: 9px; }
.public-non h4 { color: var(--red); font-size: 12px; margin-bottom: 9px; }
.public-ok li, .public-non li { font-size: 11.5px !important; }

.evin-table { width: 100%; border-collapse: collapse; margin: 14px 0; }
.evin-table th { background: rgba(201,168,76,0.15); color: var(--gold); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 9px 12px; text-align: left; border-bottom: 1px solid rgba(201,168,76,0.3); }
.evin-table td { font-size: 12px; color: var(--text-dim); padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; line-height: 1.6; }
.evin-table tr:last-child td { border-bottom: none; }
.evin-table td:first-child { color: var(--gold); font-weight: bold; white-space: nowrap; }

.evin-banner {
  background: rgba(229,57,53,0.09);
  border: 1px solid rgba(229,57,53,0.4);
  border-radius: 12px;
  padding: 18px 20px;
  text-align: center;
  margin: 28px 0;
}

.evin-banner .evin-main {
  font-size: 13px;
  color: #EE9090;
  font-weight: bold;
  letter-spacing: 1px;
  line-height: 1.5;
}

.evin-banner .evin-tel {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  display: block;
}

.cgu-footer {
  text-align: center;
  border-top: 1px solid rgba(201,168,76,0.2);
  padding-top: 24px;
  margin-top: 40px;
}

.cgu-footer p { font-size: 11px; color: var(--text-dim); line-height: 1.7; margin-bottom: 4px; }
.cgu-footer .version {
  display: inline-block;
  margin-top: 10px;
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 1px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--green);
  color: #fff;
  padding: 13px 28px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  font-family: 'Georgia', serif;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 9999;
  white-space: nowrap;
  box-shadow: 0 6px 24px rgba(76,175,80,0.4);
}

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<!-- ============================================================
     PAGE 1 : SÉLECTION DE LANGUE
============================================================ -->
<div id="page-lang">

============================================================ -->
<div id="page-accueil">

<!-- ============================================================
     PAGE 3 : CGU COMPLÈTES
============================================================ -->
<div id="page-cgu">
  <div class="cgu-header">

  </div>
  <div class="cgu-content" id="cgu-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

    cgu: `

      <div class="cgu-article">

// ============================================================
// ÉTAT
// ============================================================
let currentLang = null;
let cbChecked = false;

const CGV_KEY = 'hwc_cgv_accepted_v1';
const LANG_KEY = 'hwc_lang_v1';

// ============================================================
// NAVIGATION
// ============================================================
function show(id) {
  ['page-lang','page-accueil','page-cgu'].forEach(p => {
    const el = document.getElementById(p);
    el.style.display = 'none';
  });
  const target = document.getElementById(id);
  target.style.display = (id === 'page-accueil') ? 'flex' : 'block';
  window.scrollTo(0, 0);
}

function selectLang(code) {
  currentLang = code;
  try { localStorage.setItem(LANG_KEY, code); } catch(e) {}
  applyLang(code);
  show('page-accueil');
}

function backToLang() {
  show('page-lang');
}

function applyLang(code) {
  const L = LANGS[code];
  document.getElementById('lang-badge').textContent = L.flag;
  document.getElementById('txt-subtitle').textContent = L.subtitle;
  document.getElementById('txt-evin-short').textContent = L.evinShort;
  document.getElementById('btn-jouer').textContent = L.play;
  document.getElementById('btn-back-cgu').textContent = L.backBtn;
  document.getElementById('txt-cgu-header-title').textContent = L.cguHeaderTitle;
  document.getElementById('toast').textContent = L.toast;

  // Bloc consentement
  const cgvText = document.getElementById('txt-consent-pre');
  cgvText.innerHTML = L.consentPre +
    `<button class="cgv-link" id="btn-open-cgu">${L.consentLink}</button>` +
    L.consentPost;

  // Rebrancher le listener du lien
  document.getElementById('btn-open-cgu').addEventListener('click', function(e) {
    e.stopPropagation();
    openCGU();
  });

  // Contenu CGU
  document.getElementById('cgu-body').innerHTML = L.cgu;

  // Restaurer état checkbox
  const wasAccepted = (() => { try { return localStorage.getItem(CGV_KEY) === '1'; } catch(e) { return false; } })();
  setChecked(wasAccepted);
}

function openCGU() {
  show('page-cgu');
}

// ============================================================
// CHECKBOX
// ============================================================
function setChecked(val) {
  cbChecked = val;
  const cb = document.getElementById('cgv-checkbox');
  const custom = document.getElementById('custom-cb');
  const btn = document.getElementById('btn-jouer');
  if (cb) cb.checked = val;
  if (custom) val ? custom.classList.add('checked') : custom.classList.remove('checked');
  if (btn) val ? btn.classList.add('active') : btn.classList.remove('active');
}

document.getElementById('cgv-label').addEventListener('click', function(e) {
  const openBtn = document.getElementById('btn-open-cgu');
  if (openBtn && e.target === openBtn) return;
  setChecked(!cbChecked);
});

// ============================================================
// BOUTONS
// ============================================================
document.getElementById('btn-jouer').addEventListener('click', function() {
  if (!cbChecked) return;
  try { localStorage.setItem(CGV_KEY, '1'); } catch(e) {}
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
  setTimeout(() => {
    // Remplacer par : window.location.href = 'index.html';
    alert('▶ Lancement de HeadWaiter Challenge !\n\n(Connecter à votre index.html principal)');
  }, 500);
});

document.getElementById('btn-back-cgu').addEventListener('click', function() {
  show('page-accueil');
});

document.getElementById('lang-badge').addEventListener('click', backToLang);

// ============================================================
// INIT : langue mémorisée ?
// ============================================================
(function init() {
  try {
    const savedLang = localStorage.getItem(LANG_KEY);
    if (savedLang && LANGS[savedLang]) {
      selectLang(savedLang);
      return;
    }
  } catch(e) {}
  show('page-lang');
})();
</script>
