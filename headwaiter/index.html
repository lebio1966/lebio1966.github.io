<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0826;
    font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── Wrapper 16:9 ── */
  #stage {
    position: relative;
    width: min(100vw, 177.78vh);
    height: min(100vh, 56.25vw);
    background: #0d0826;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ══════════════════════════════════════════
     ÉCRAN PRINCIPAL (sélecteur de langue)
  ══════════════════════════════════════════ */
  #app {
    position: absolute; inset: 0;
    background: #1B0D61;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  #app::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(150,140,255,0.08) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events: none;
  }

  .inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: clamp(32px, 6vw, 80px);
    width: 100%; height: 100%;
    padding: 4% 6%;
  }

  .logo-section {
    display: flex; flex-direction: column;
    align-items: center; gap: clamp(8px,1.5vh,16px);
    flex: 0 0 auto;
  }

  .logo-icon {
    width: clamp(60px,11vh,100px); height: clamp(60px,11vh,100px);
    background: #7F77DD; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(30px,5.5vh,52px);
    box-shadow: 0 0 40px rgba(127,119,221,0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(127,119,221,0.6); }
    50%      { box-shadow: 0 0 60px rgba(127,119,221,0.9), 0 0 20px rgba(239,159,39,0.3); }
  }

  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px,5.5vw,52px);
    color: #fff; letter-spacing: 2px;
    text-align: center; line-height: 1; white-space: nowrap;
  }
  .logo-title span { color: #EF9F27; }

  .logo-sub {
    font-size: clamp(9px,1.2vw,13px); font-weight: 800;
    color: rgba(255,255,255,0.4); letter-spacing: 3px;
    text-transform: uppercase; text-align: center;
  }

  .sep {
    width: 1px; height: clamp(120px,40vh,280px);
    background: linear-gradient(180deg, transparent, rgba(201,169,110,0.5), transparent);
    flex: 0 0 auto;
  }

  .lang-grid {
    display: flex; flex-direction: column;
    gap: clamp(6px,1.2vh,14px);
    width: clamp(220px,32vw,380px);
  }

  .lang-btn {
    display: flex; align-items: center; gap: 14px;
    padding: clamp(10px,1.6vh,18px) 18px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    cursor: pointer;
    color: #fff;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    /* bouton natif, pas de lien href */
    font-family: 'Nunito', sans-serif;
    width: 100%; text-align: left;
  }

  .lang-btn:hover, .lang-btn:active {
    background: rgba(127,119,221,0.2);
    border-color: rgba(127,119,221,0.5);
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .lang-flag  { font-size: clamp(22px,3.5vh,32px); line-height: 1; }
  .lang-info  { flex: 1; text-align: left; }
  .lang-name  { font-family: 'Fredoka One', cursive; font-size: clamp(15px,2.2vh,22px); color: #fff; line-height: 1.1; }
  .lang-label { font-size: clamp(9px,1.1vh,12px); color: rgba(212,184,150,0.5); font-weight: 600; letter-spacing: 0.5px; }
  .lang-arrow { font-size: clamp(14px,2vh,20px); color: rgba(255,255,255,0.3); }

  /* ══════════════════════════════════════════
     OVERLAY CGU (plein écran par-dessus #app)
  ══════════════════════════════════════════ */
  #overlay-cgu {
    display: none;
    position: absolute; inset: 0;
    z-index: 100;
    background: linear-gradient(180deg, #0B1E38 0%, #071428 100%);
    overflow-y: auto;
    font-family: 'Georgia', serif;
    color: #F0E6D0;
  }

  /* ── Header sticky ── */
  .cgu-header {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(135deg, #0D1F3C 0%, #112444 100%);
    border-bottom: 2px solid #C9A84C;
    padding: 12px 18px;
    display: flex; align-items: center; gap: 14px;
  }

  .btn-back {
    background: rgba(201,168,76,0.12);
    border: 1px solid #C9A84C;
    color: #C9A84C;
    border-radius: 8px; padding: 7px 14px;
    font-size: 13px; cursor: pointer;
    font-family: 'Georgia', serif;
    transition: background 0.2s; white-space: nowrap;
  }
  .btn-back:hover { background: rgba(201,168,76,0.28); }

  .cgu-header-title { color: #C9A84C; font-size: 13px; font-weight: bold; letter-spacing: 0.8px; }

  /* ── Contenu CGU ── */
  .cgu-content { max-width: 760px; margin: 0 auto; padding: 30px 20px 70px; }

  .cgu-page-title { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(201,168,76,0.25); }
  .cgu-page-title .hat { font-size: 44px; display: block; margin-bottom: 8px; }
  .cgu-page-title h1 { font-size: 22px; color: #C9A84C; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
  .cgu-page-title .meta { font-size: 10px; color: #A89070; letter-spacing: 2px; text-transform: uppercase; }
  .cgu-page-title .editeur {
    display: inline-block; margin-top: 10px;
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px; padding: 4px 14px; font-size: 11px; color: #C9A84C;
  }

  .cgu-article { margin-bottom: 28px; }
  .cgu-article h2 { font-size: 14px; color: #C9A84C; border-bottom: 1px solid rgba(201,168,76,0.28); padding-bottom: 7px; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .cgu-article p  { font-size: 12px; color: #A89070; line-height: 1.8; margin-bottom: 9px; }
  .cgu-article ul { list-style: none; padding: 0; margin: 7px 0; }
  .cgu-article ul li { font-size: 12px; color: #A89070; line-height: 1.65; padding: 4px 0 4px 20px; position: relative; }
  .cgu-article ul li::before { content: '▸'; color: #C9A84C; position: absolute; left: 0; }

  .info-box { background: rgba(201,168,76,0.07); border-left: 3px solid #C9A84C; border-radius: 0 8px 8px 0; padding: 11px 16px; margin: 12px 0; }
  .info-box .box-label { font-size: 9px; color: #C9A84C; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .info-box p { font-size: 11px; margin: 0; line-height: 1.6; }

  .warning-box { background: rgba(229,57,53,0.08); border-left: 3px solid #E53935; border-radius: 0 8px 8px 0; padding: 11px 16px; margin: 12px 0; }
  .warning-box .box-label { font-size: 9px; color: #E53935; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .warning-box p { font-size: 11px; color: #E8A0A0; margin: 0; line-height: 1.6; }

  .public-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .public-ok { background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.3); border-radius: 10px; padding: 12px; }
  .public-non { background: rgba(229,57,53,0.08); border: 1px solid rgba(229,57,53,0.3); border-radius: 10px; padding: 12px; }
  .public-ok h4 { color: #4CAF50; font-size: 11px; margin-bottom: 7px; }
  .public-non h4 { color: #E53935; font-size: 11px; margin-bottom: 7px; }
  .public-ok li, .public-non li { font-size: 11px !important; }

  .evin-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .evin-table th { background: rgba(201,168,76,0.15); color: #C9A84C; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 10px; text-align: left; border-bottom: 1px solid rgba(201,168,76,0.3); }
  .evin-table td { font-size: 11px; color: #A89070; padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; line-height: 1.55; }
  .evin-table tr:last-child td { border-bottom: none; }
  .evin-table td:first-child { color: #C9A84C; font-weight: bold; white-space: nowrap; }

  .evin-banner { background: rgba(229,57,53,0.09); border: 1px solid rgba(229,57,53,0.4); border-radius: 12px; padding: 16px 18px; text-align: center; margin: 24px 0; }
  .evin-banner .evin-main { font-size: 12px; color: #EE9090; font-weight: bold; letter-spacing: 1px; line-height: 1.5; }
  .evin-banner .evin-tel { font-size: 10px; color: #A89070; margin-top: 7px; display: block; }

  .cgu-footer { text-align: center; border-top: 1px solid rgba(201,168,76,0.2); padding-top: 20px; margin-top: 36px; }
  .cgu-footer p { font-size: 10px; color: #A89070; line-height: 1.7; margin-bottom: 3px; }
  .cgu-footer .version { display: inline-block; margin-top: 8px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; padding: 3px 12px; font-size: 9px; color: #C9A84C; letter-spacing: 1px; }

  /* ── Bloc consentement (bas de l'overlay) ── */
  .consent-bar {
    position: sticky; bottom: 0;
    background: linear-gradient(0deg, #0B1E38 80%, transparent 100%);
    padding: 14px 20px 20px;
    max-width: 760px; margin: 0 auto;
  }

  .consent-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.28);
    border-radius: 12px; padding: 14px 18px 10px;
    backdrop-filter: blur(6px);
  }

  .cgv-checkbox-row { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; user-select: none; }
  .cgv-checkbox-row input[type="checkbox"] { display: none; }

  .custom-checkbox {
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid #C9A84C; border-radius: 5px;
    background: rgba(201,168,76,0.08);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.25s;
  }
  .custom-checkbox.checked { background: #C9A84C; box-shadow: 0 0 12px rgba(201,168,76,0.55); }
  .custom-checkbox.checked::after { content: '✓'; color: #0A1628; font-size: 13px; font-weight: bold; }

  .cgv-text { font-size: 12px; color: #A89070; line-height: 1.6; }

  .evin-short { font-size: 9px; color: rgba(201,168,76,0.4); text-align: center; margin-top: 8px; letter-spacing: 0.3px; }

  .btn-jouer {
    display: block; width: 100%; margin-top: 12px;
    background: linear-gradient(135deg, #C9A84C 0%, #A8782A 100%);
    color: #0A1628; border: none; border-radius: 50px;
    padding: 14px 0; font-size: 16px; font-weight: bold;
    font-family: 'Fredoka One', cursive; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    transition: all 0.3s; opacity: 0.35; pointer-events: none;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  }
  .btn-jouer.active { opacity: 1; pointer-events: all; box-shadow: 0 6px 28px rgba(201,168,76,0.55); }
  .btn-jouer.active:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(201,168,76,0.7); }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #4CAF50; color: #fff;
    padding: 11px 24px; border-radius: 50px;
    font-size: 13px; font-weight: bold;
    font-family: 'Fredoka One', cursive;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap;
    box-shadow: 0 6px 22px rgba(76,175,80,0.45);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="stage">

  <!-- ══════════════════════════════════════════
       ÉCRAN 1 : SÉLECTEUR DE LANGUE
  ══════════════════════════════════════════ -->
  <div id="app">
    <div class="inner">

      <!-- Logo gauche -->
      <div class="logo-section">
        <div class="logo-icon">🍽️</div>
        <div class="logo-title">Head<span>Waiter</span></div>
        <div class="logo-sub">Choose your language</div>
      </div>

      <!-- Séparateur vertical -->
      <div class="sep"></div>

      <!-- Boutons langue -->
      <div class="lang-grid">
        <button class="lang-btn" onclick="openCGU('fr','fr.html')">
          <span class="lang-flag">🇫🇷</span>

            <div class="lang-name">English</div>
            <div class="lang-label">Full version · 352 questions</div>
          </div>
          <span class="lang-arrow">›</span>
        </button>
        <button class="lang-btn" onclick="openCGU('de','de.html')">
          <span class="lang-flag">🇩🇪</span>
          <div class="lang-info">
            <div class="lang-name">Deutsch</div>
            <div class="lang-label">Vollständige Version · 352 Fragen</div>
          </div>
          <span class="lang-arrow">›</span>
        </button>
        <button class="lang-btn" onclick="openCGU('es','es.html')">
          <span class="lang-flag">🇪🇸</span>
          <div class="lang-info">
            <div class="lang-name">Español</div>
            <div class="lang-label">Versión completa · 352 preguntas</div>

        <button class="lang-btn" onclick="openCGU('it','it.html')">

            <div class="lang-name">Italiano</div>
            <div class="lang-label">Versione completa · 352 domande</div>
          </div>
          <span class="lang-arrow">›</span>
        </button>
      </div>

    </div>
  </div><!-- fin #app -->

  <!-- ══════════════════════════════════════════
       ÉCRAN 2 : OVERLAY CGU (s'affiche par-dessus)
  ══════════════════════════════════════════ -->
  <div id="overlay-cgu">

    <!-- Header sticky -->
    <div class="cgu-header">
      <button class="btn-back" id="btn-back">← Retour</button>
      <div class="cgu-header-title" id="cgu-header-title"></div>
    </div>

    <!-- Corps CGU (injecté dynamiquement) -->
    <div class="cgu-content" id="cgu-body"></div>

    <!-- Barre de consentement sticky en bas -->
    <div class="consent-bar">
      <div class="consent-box">
        <label class="cgv-checkbox-row" id="cgv-label">
          <input type="checkbox" id="cgv-checkbox">
          <div class="custom-checkbox" id="custom-cb"></div>
          <span class="cgv-text" id="cgv-text-span"></span>
        </label>
        <div class="evin-short" id="evin-short-txt"></div>
        <button class="btn-jouer" id="btn-jouer"></button>
      </div>
    </div>

  </div><!-- fin #overlay-cgu -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div><!-- fin #stage -->

<script>
// ══════════════════════════════════════════════════════
// CONTENUS MULTILINGUES
// ══════════════════════════════════════════════════════
const LANGS = {
  fr: {
    headerTitle: 'Conditions Générales d\'Utilisation — HeadWaiter Challenge™',
    consentPre:  'J\'ai lu et j\'accepte les ',
    consentLink: 'Conditions Générales d\'Utilisation',
    consentPost: ' de HeadWaiter Challenge, notamment les dispositions relatives aux contenus pédagogiques portant sur les boissons et produits du service en restauration.',
    evinShort:   '⚠️ L\'abus d\'alcool est dangereux pour la santé — Application à vocation pédagogique exclusivement',
    play:        '▶  Jouer',
    toast:       '✓ CGU acceptées — Bon jeu !',

// ══════════════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════════════
const CGV_KEY_PREFIX = 'hwc_cgv_v1_';
let currentLang = null;
let currentTarget = null;
let cbChecked = false;

// ══════════════════════════════════════════════════════
// OUVERTURE OVERLAY CGU
// ══════════════════════════════════════════════════════
function openCGU(langCode, targetFile) {
  currentLang   = langCode;
  currentTarget = targetFile;
  const L = LANGS[langCode];

  // Remplir header
  document.getElementById('cgu-header-title').textContent = L.headerTitle;
  document.getElementById('btn-back').textContent = L.back;

  // Remplir corps CGU
  document.getElementById('cgu-body').innerHTML = L.cgu;

  // Remplir bloc consentement
  document.getElementById('cgv-text-span').innerHTML =
    L.consentPre +
    `<span style="color:#C9A84C;text-decoration:underline;font-weight:bold;">${L.consentLink}</span>` +
    L.consentPost;

  document.getElementById('evin-short-txt').textContent = L.evinShort;
  document.getElementById('btn-jouer').textContent = L.play;
  document.getElementById('toast').textContent = L.toast;

  // Restaurer état checkbox pour cette langue
  const wasAccepted = (() => {
    try { return localStorage.getItem(CGV_KEY_PREFIX + langCode) === '1'; } catch(e) { return false; }
  })();
  setChecked(wasAccepted);

  // Afficher overlay, remonter en haut
  const overlay = document.getElementById('overlay-cgu');
  overlay.style.display = 'block';
  overlay.scrollTop = 0;
}

// ══════════════════════════════════════════════════════
// FERMETURE OVERLAY (retour au sélecteur)
// ══════════════════════════════════════════════════════
document.getElementById('btn-back').addEventListener('click', function() {
  document.getElementById('overlay-cgu').style.display = 'none';
  cbChecked = false;
});

// ══════════════════════════════════════════════════════
// CHECKBOX
// ══════════════════════════════════════════════════════
function setChecked(val) {
  cbChecked = val;
  const cb     = document.getElementById('cgv-checkbox');
  const custom = document.getElementById('custom-cb');
  const btn    = document.getElementById('btn-jouer');
  if (cb)     cb.checked = val;
  if (custom) val ? custom.classList.add('checked') : custom.classList.remove('checked');
  if (btn)    val ? btn.classList.add('active')     : btn.classList.remove('active');
}

document.getElementById('cgv-label').addEventListener('click', function() {
  setChecked(!cbChecked);
});

// ══════════════════════════════════════════════════════
// BOUTON JOUER → mémoriser + rediriger vers le jeu
// ══════════════════════════════════════════════════════
document.getElementById('btn-jouer').addEventListener('click', function() {
  if (!cbChecked || !currentLang || !currentTarget) return;

  // Mémoriser l'acceptation pour cette langue
  try { localStorage.setItem(CGV_KEY_PREFIX + currentLang, '1'); } catch(e) {}

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');

  // Redirection vers le fichier de jeu de la langue choisie
  setTimeout(() => {
    window.location.href = currentTarget;
  }, 700);
});
</script>
