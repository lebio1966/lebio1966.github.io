<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0826;
    font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── Wrapper 16:9 ── */
  #stage {
    position: relative;
    /* Force le ratio 16:9 */
    width: min(100vw, 177.78vh);   /* 177.78vh = 100vh × 16/9 */
    height: min(100vh, 56.25vw);   /* 56.25vw  = 100vw × 9/16 */
    background: #0d0826;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #app {
    position: relative;
    width: 100%; height: 100%;
    background: #1B0D61;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* Background dots */
  #app::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(150,140,255,0.08) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events: none;
  }

  /* ── Layout horizontal pour 16:9 ── */
  .inner {
    position: relative; z-index: 2;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(32px, 6vw, 80px);
    width: 100%; height: 100%;
    padding: 4% 6%;
  }

  /* Logo section */
  .logo-section {
    display: flex; flex-direction: column;
    align-items: center; gap: clamp(8px, 1.5vh, 16px);
    flex: 0 0 auto;
  }

  .logo-icon {
    width: clamp(60px, 11vh, 100px);
    height: clamp(60px, 11vh, 100px);
    background: #7F77DD;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(30px, 5.5vh, 52px);
    box-shadow: 0 0 40px rgba(127,119,221,0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(127,119,221,0.6); }
    50%      { box-shadow: 0 0 60px rgba(127,119,221,0.9), 0 0 20px rgba(239,159,39,0.3); }
  }

  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 5.5vw, 52px);
    color: #fff;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    white-space: nowrap;
  }
  .logo-title span { color: #EF9F27; }

  .logo-sub {
    font-size: clamp(9px, 1.2vw, 13px);
    font-weight: 800;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }

  /* Vertical separator */
  .sep {
    width: 1px;
    height: clamp(120px, 40vh, 280px);
    background: linear-gradient(180deg, transparent, rgba(201,169,110,0.5), transparent);
    flex: 0 0 auto;
  }

  /* Lang buttons grid */
  .lang-grid {
    display: flex; flex-direction: column;
    gap: clamp(6px, 1.2vh, 14px);
    width: clamp(220px, 32vw, 380px);
  }

  .lang-btn {
    display: flex; align-items: center; gap: 14px;
    padding: clamp(10px, 1.6vh, 18px) 18px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn:hover, .lang-btn:active {
    background: rgba(127,119,221,0.2);
    border-color: rgba(127,119,221,0.5);
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .lang-flag { font-size: clamp(22px, 3.5vh, 32px); line-height: 1; }

  .lang-info { flex: 1; text-align: left; }
  .lang-name {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(15px, 2.2vh, 22px);
    color: #fff;
    line-height: 1.1;
  }
  .lang-label {
    font-size: clamp(9px, 1.1vh, 12px);
    color: rgba(212,184,150,0.5);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .lang-arrow {
    font-size: clamp(14px, 2vh, 20px);
    color: rgba(255,255,255,0.3);
  }

  /* Brand logo bottom */
  .brand-logo {
    position: absolute;
    bottom: clamp(8px, 1.5vh, 20px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0.55;
  }
  .brand-logo img { height: clamp(24px, 3.5vh, 40px); }
</style>
</head>
<body>
<div id="stage">
  <div id="app">
    <div class="inner">

      <!-- Logo gauche -->
      <div class="logo-section">
        <div class="logo-icon">🍽️</div>
        <div class="logo-title">Head<span>Waiter</span></div>
        <div class="logo-sub">Choose your language</div>
      </div>

      <!-- Séparateur vertical -->
      <div class="sep"></div>

      <!-- Boutons langue droite -->
      <div class="lang-grid">
        <a class="lang-btn" href="fr.html">
          <span class="lang-flag">🇫🇷</span>
          <div class="lang-info">
            <div class="lang-name">Français</div>
            <div class="lang-label">Version complète · 352 questions</div>
          </div>
          <span class="lang-arrow">›</span>
        </a>
        <a class="lang-btn" href="en.html">
          <span class="lang-flag">🇬🇧</span>
