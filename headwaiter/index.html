<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0826;
    font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  #app {
    position: relative;
    width: 100%; height: 100%;
    max-width: 480px;
    background: #1B0D61;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* Background dots */
  #app::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(150,140,255,0.08) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events: none;
  }

  /* Logo area */
  .logo-section {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 88px; height: 88px;
    background: #7F77DD;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px;
    box-shadow: 0 0 40px rgba(127,119,221,0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(127,119,221,0.6); }
    50% { box-shadow: 0 0 60px rgba(127,119,221,0.9), 0 0 20px rgba(239,159,39,0.3); }
  }

  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: #fff;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
  }
  .logo-title span { color: #EF9F27; }

  .logo-sub {
    font-size: 11px; font-weight: 800;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Deco line */
  .deco {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.5), transparent);
    margin-bottom: 40px;
    position: relative; z-index: 2;
  }

  /* Lang buttons */
  .lang-grid {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    gap: 12px;
    width: 100%; max-width: 320px;
    padding: 0 24px;
  }

  .lang-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn:hover, .lang-btn:active {
    background: rgba(127,119,221,0.2);
    border-color: rgba(127,119,221,0.5);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .lang-flag { font-size: 32px; line-height: 1; }

  .lang-info { flex: 1; text-align: left; }
  .lang-name {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #fff;
    line-height: 1.1;
  }
  .lang-label {
    font-size: 12px;
    color: rgba(212,184,150,0.5);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .lang-arrow {
    font-size: 18px;
    color: rgba(255,255,255,0.3);
  }

  /* Logo H&C bottom */
  .brand-logo {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0.6;
  }
  .brand-logo img { height: 36px; }

  /* Responsive for 16:9 landscape */
  @media (orientation: landscape) and (max-height: 500px) {
    #app {
      flex-direction: row;
      justify-content: space-evenly;
      padding: 20px;
      max-width: 900px;
    }
    .logo-section { margin-bottom: 0; }
    .deco { display: none; }
    .lang-grid { max-width: 380px; }
    .brand-logo { bottom: 8px; }
  }
</style>
</head>
